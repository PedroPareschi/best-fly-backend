version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: bestfly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: best_fly
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - bestfly-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d best_fly"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bestfly-network

  redis:
    image: redis:8
    container_name: bestfly-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - bestfly-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bestfly-network

  backend:
    build: .
    container_name: bestfly-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_FORWARD_HEADERS_STRATEGY: native
      SECURITY_JWT_SECRET: ${JWT_SECRET}
      SPRINGDOC_SWAGGER_UI_URL: https://bestflyapi.duckdns.org/v3/api-docs

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/best_fly
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      JWT_SECRET: ${JWT_SECRET}
      DUFFEL_TOKEN: ${DUFFEL_TOKEN}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - bestfly-network

volumes:
  bestfly-postgres-data:
  bestfly-redis-data:

networks:
  bestfly-network:
    driver: bridge